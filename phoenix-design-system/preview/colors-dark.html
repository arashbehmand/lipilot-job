<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div style="background:#0A0A0A;color:#FAFAFA;padding:18px;border-radius:6px;font-family:var(--sans)">
      <div class="row">
        <div class="col"><div class="swatch" style="background:#0A0A0A;border-color:#262626"><span class="name">bg</span></div><span class="hex" style="color:#A3A3A3">#0A0A0A</span></div>
        <div class="col"><div class="swatch" style="background:#141414;border-color:#262626"><span class="name">bg-2</span></div><span class="hex" style="color:#A3A3A3">#141414</span></div>
        <div class="col"><div class="swatch" style="background:#FF8A3D"><span class="name" style="color:#000">orange</span></div><span class="hex" style="color:#A3A3A3">#FF8A3D</span></div>
        <div class="col"><div class="swatch" style="background:#5B9FFF"><span class="name" style="color:#000">blue</span></div><span class="hex" style="color:#A3A3A3">#5B9FFF</span></div>
        <div class="col"><div class="swatch" style="background:#FAFAFA"><span class="name" style="color:#000">ink</span></div><span class="hex" style="color:#A3A3A3">#FAFAFA</span></div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:#A3A3A3;font-family:var(--mono)">Dark scheme · automatic via @media (prefers-color-scheme: dark)</div>
    </div></body></html>

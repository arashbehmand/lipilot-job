<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="row" style="gap:14px;align-items:flex-end">
      <div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:0px"></div><span class="hex">--r-0</span></div><div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:2px"></div><span class="hex">--r-1</span></div><div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:4px"></div><span class="hex">--r-2</span></div><div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:6px"></div><span class="hex">--r-3</span></div><div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:8px"></div><span class="hex">--r-4</span></div><div class="col" style="align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--bg-2);border:1px solid var(--line);border-radius:100px"></div><span class="hex">--r-pill</span></div>
    </div></body></html>

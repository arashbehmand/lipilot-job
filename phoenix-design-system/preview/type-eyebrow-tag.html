<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col" style="gap:18px">
      <div><div class="label">Eyebrow · orange · 12 / 600 / 0.14em / uppercase</div><div style="font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange)">— Capabilities</div></div>
      <div><div class="label">Eyebrow · blue · informational variant</div><div style="font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue)">— Roadmap</div></div>
      <div class="row" style="gap:8px">
        <span style="font-size:11px;letter-spacing:0.02em;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">user_default</span>
        <span style="font-size:11px;letter-spacing:0.02em;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">text</span>
        <span style="font-size:11px;letter-spacing:0.02em;padding:3px 8px;background:var(--blue-soft);border-radius:2px;color:var(--blue-deep);font-weight:500">From default</span>
        <span style="font-size:11px;letter-spacing:0.02em;padding:3px 8px;background:var(--orange-soft);border-radius:2px;color:var(--orange-deep);font-weight:500">Generating…</span>
      </div>
    </div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col" style="gap:14px">
      <div class="row">
        <button style="background:var(--orange);color:#fff;padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:pointer">Primary · Get started</button>
        <button style="background:var(--ink);color:#fff;padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:pointer">Secondary · Sign in</button>
        <button style="background:transparent;color:var(--ink);padding:11px 22px;border-radius:6px;border:1px solid var(--line-strong);font:500 14px var(--sans);cursor:pointer">Ghost · Cancel</button>
      </div>
      <div class="row">
        <button style="background:var(--blue);color:#fff;padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:pointer">Info · View details</button>
        <button style="background:transparent;color:var(--blue);padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:pointer">Link · Learn more →</button>
        <button style="background:var(--danger);color:#fff;padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:pointer">Delete session</button>
      </div>
      <div class="row">
        <button style="background:var(--orange);color:#fff;padding:7px 14px;border-radius:4px;border:none;font:500 13px var(--sans);cursor:pointer">SM</button>
        <button style="background:var(--orange);color:#fff;padding:14px 28px;border-radius:8px;border:none;font:500 16px var(--sans);cursor:pointer">Large</button>
        <button disabled style="background:var(--bg-3);color:var(--ink-soft);padding:11px 22px;border-radius:6px;border:none;font:500 14px var(--sans);cursor:not-allowed">Disabled</button>
      </div>
    </div></body></html>

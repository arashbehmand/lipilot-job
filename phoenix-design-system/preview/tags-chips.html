<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col" style="gap:14px">
      <div class="row">
        <span style="font-size:11px;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">user_default</span>
        <span style="font-size:11px;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">text</span>
        <span style="font-size:11px;padding:3px 8px;background:var(--bg-3);border-radius:2px;color:var(--ink)">v1</span>
      </div>
      <div class="row">
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--positive-soft);color:var(--positive);border-radius:100px;font-weight:500"><span style="width:6px;height:6px;border-radius:100px;background:currentColor"></span>Generated</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--orange-soft);color:var(--orange-deep);border-radius:100px;font-weight:500"><span style="width:6px;height:6px;border-radius:100px;background:currentColor"></span>Generating</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--bg-3);color:var(--ink-soft);border-radius:100px;font-weight:500"><span style="width:6px;height:6px;border-radius:100px;background:currentColor"></span>Empty</span>
        <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--danger-soft);color:var(--danger);border-radius:100px;font-weight:500"><span style="width:6px;height:6px;border-radius:100px;background:currentColor"></span>Failed</span>
      </div>
      <div class="row">
        <span style="font-size:11px;padding:3px 8px;background:var(--blue-soft);color:var(--blue-deep);border-radius:2px;font-weight:500">From default</span>
        <span style="font-size:11px;padding:3px 8px;background:var(--orange);color:#fff;border-radius:2px;font-weight:600">New</span>
      </div>
    </div></body></html>

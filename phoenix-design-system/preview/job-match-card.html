<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:18px 20px;max-width:560px">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:18px">
        <div>
          <div class="row" style="gap:8px;margin-bottom:6px"><span class="label" style="color:var(--orange)">Strong match · 88%</span></div>
          <div style="font-size:16px;font-weight:600;color:var(--ink);margin-bottom:2px">Lead ML Engineer · J&amp;J Fintech</div>
          <div style="font-size:13px;color:var(--ink-mid)">Berlin · Hybrid · €110–145k</div>
        </div>
        <button style="background:var(--orange);color:#fff;padding:8px 16px;border-radius:4px;border:none;font:500 13px var(--sans);cursor:pointer">Apply →</button>
      </div>
      <div style="display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)">
        <span style="font-size:11px;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">PyTorch</span>
        <span style="font-size:11px;padding:3px 8px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mid)">MLOps</span>
        <span style="font-size:11px;padding:3px 8px;background:var(--blue-soft);color:var(--blue-deep);border-radius:2px;font-weight:500">Regulated data</span>
      </div>
    </div></body></html>

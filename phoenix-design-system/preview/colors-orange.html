<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col">
      <div class="row">
        <div class="col"><div class="swatch" style="background:#D8541A"><span class="name">orange-deep</span></div><span class="hex">#D8541A · hover</span></div>
        <div class="col"><div class="swatch" style="background:#F26522"><span class="name">orange</span></div><span class="hex">#F26522 · primary</span></div>
        <div class="col"><div class="swatch" style="background:#FF8A3D"><span class="name">orange-bright</span></div><span class="hex">#FF8A3D</span></div>
        <div class="col"><div class="swatch lt" style="background:#FFE7D6"><span class="name">orange-soft</span></div><span class="hex">#FFE7D6 · tint</span></div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--ink-mid);max-width:60ch">Primary brand. CTAs, focus, the <em style="color:var(--orange);font-style:normal;font-weight:600">phoenix</em> in the wordmark. Used as a real accent — not decoratively.</div>
    </div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col" style="gap:6px">
      <div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-1</span><div style="height:14px;width:4px;background:var(--orange)"></div><span class="hex">4px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-2</span><div style="height:14px;width:8px;background:var(--orange)"></div><span class="hex">8px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-3</span><div style="height:14px;width:12px;background:var(--orange)"></div><span class="hex">12px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-4</span><div style="height:14px;width:16px;background:var(--orange)"></div><span class="hex">16px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-5</span><div style="height:14px;width:20px;background:var(--orange)"></div><span class="hex">20px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-6</span><div style="height:14px;width:24px;background:var(--orange)"></div><span class="hex">24px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-8</span><div style="height:14px;width:32px;background:var(--orange)"></div><span class="hex">32px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-10</span><div style="height:14px;width:40px;background:var(--orange)"></div><span class="hex">40px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-12</span><div style="height:14px;width:48px;background:var(--orange)"></div><span class="hex">48px</span></div><div class="row" style="gap:14px"><span class="label" style="width:48px;text-align:right">--s-16</span><div style="height:14px;width:64px;background:var(--orange)"></div><span class="hex">64px</span></div>
    </div></body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ember & Indigo</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; gap: 18px; }
  .row-1 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.6 / 1; border-radius: 3px; border: 1px solid var(--ink-dim); }
  .name { font-size: 11px; color: var(--ink); font-weight: 500; }
  .hex  { font-family: var(--mono); font-size: 10.5px; color: var(--ink-mid); }
  .demo { display: flex; align-items: baseline; gap: 16px; padding-top: 6px; border-top: 1px solid var(--ink-dim); }
  .demo h2 { font-family: var(--serif); font-weight: 300; font-size: 22px; line-height: 1.1; color: var(--ink); }
  .demo h2 em { font-style: italic; color: var(--ember); font-weight: 400; }
  .demo small { font-size: 10.5px; color: var(--ink-mid); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row-1">
    <div class="sw"><div class="chip" style="background:#C2541F"></div><div class="name">ember</div><div class="hex">#C2541F</div></div>
    <div class="sw"><div class="chip" style="background:#9F4316"></div><div class="name">ember-deep</div><div class="hex">#9F4316</div></div>
    <div class="sw"><div class="chip" style="background:#E66B2C"></div><div class="name">ember-bright</div><div class="hex">#E66B2C</div></div>
    <div class="sw"><div class="chip" style="background:#2A4A7F"></div><div class="name">indigo</div><div class="hex">#2A4A7F</div></div>
    <div class="sw"><div class="chip" style="background:rgba(194,84,31,0.10); border:1px solid #C2541F"></div><div class="name">ember-dim</div><div class="hex">10%</div></div>
  </div>

  <div class="demo">
    <h2>Applications that read the <em>room</em>.</h2>
    <small>italic 400, ember</small>
  </div>
</body>
</html>

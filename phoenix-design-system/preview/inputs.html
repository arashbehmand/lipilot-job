<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="col" style="gap:12px;max-width:380px">
      <div><div class="label" style="margin-bottom:4px">Text input</div><input placeholder="you@company.com" style="width:100%;background:var(--bg);border:1px solid var(--line-strong);border-radius:4px;padding:11px 14px;font:14px var(--sans);color:var(--ink);outline:none"></div>
      <div><div class="label" style="margin-bottom:4px">Focused (orange ring)</div><input value="J&amp;J — Fintech ML role" style="width:100%;background:var(--bg);border:1px solid var(--orange);border-radius:4px;padding:11px 14px;font:14px var(--sans);color:var(--ink);outline:none;box-shadow:0 0 0 3px var(--orange-soft)"></div>
      <div><div class="label" style="margin-bottom:4px">Error</div><input value="invalid" style="width:100%;border:1px solid var(--danger);border-radius:4px;padding:11px 14px;font:14px var(--sans);color:var(--ink);outline:none"><div style="font-size:12px;color:var(--danger);margin-top:4px">Email already registered</div></div>
      <div><div class="label" style="margin-bottom:4px">Textarea</div><textarea placeholder="Paste a referral note, tone you want…" style="width:100%;border:1px solid var(--line-strong);border-radius:4px;padding:11px 14px;font:14px var(--sans);color:var(--ink);outline:none;min-height:64px;resize:vertical"></textarea></div>
    </div></body></html>

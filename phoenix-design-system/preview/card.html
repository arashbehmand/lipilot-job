<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);padding:20px;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:0.04em;text-transform:uppercase}
  .swatch{width:100px;height:64px;border-radius:4px;border:1px solid var(--line);position:relative;overflow:hidden}
  .swatch .name{position:absolute;left:8px;bottom:6px;font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
  .swatch.lt .name{color:var(--ink);text-shadow:none}
  .hex{font-family:var(--mono);font-size:11px;color:var(--ink-mid);margin-top:2px}
</style></head><body>
    <div class="row" style="gap:14px;align-items:stretch">
      <div style="background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:20px;width:280px">
        <div class="label" style="margin-bottom:6px;color:var(--orange)">— Capability</div>
        <div style="font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px">Tailored resume</div>
        <div style="font-size:13.5px;color:var(--ink-mid);line-height:1.55">Reorders, reweights, prunes against this role's hard requirements.</div>
      </div>
      <div style="background:var(--bg);border:1px solid var(--orange);border-radius:6px;padding:20px;width:280px;position:relative">
        <span style="position:absolute;top:-9px;left:18px;font-size:10px;font-weight:600;background:var(--orange);color:#fff;padding:2px 8px;border-radius:2px;letter-spacing:0.02em">Most popular</span>
        <div style="font-size:16px;font-weight:600;color:var(--ink);margin-bottom:8px">Searcher</div>
        <div style="font-size:28px;font-weight:600;color:var(--ink);letter-spacing:-0.02em">$14<span style="font-size:13px;color:var(--ink-mid);font-weight:400;margin-left:4px">/month</span></div>
      </div>
    </div></body></html>
